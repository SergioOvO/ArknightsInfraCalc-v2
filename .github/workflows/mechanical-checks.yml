name: Mechanical Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mechanical:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Compile infra-core tests
        run: cargo test -p infra-core --no-run

      - name: Run infra-core tests
        run: cargo test -p infra-core --quiet

      - name: Run Codex tooling tests
        run: python3 -m unittest discover -s scripts/codex/tests -p 'test_*.py' -v

      - name: Check stable Markdown and CLI facts
        run: python3 scripts/codex/check_repository_facts.py

      - name: Check documentation lifecycle
        run: python3 scripts/codex/docs_inventory.py --check
